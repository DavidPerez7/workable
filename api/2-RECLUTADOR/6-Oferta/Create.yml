        "fechaLimite": "2026-04-30",
        "salario": 4500000,
        "numeroVacantes": 2,
        "nivelExperiencia": "EXPERTO",
        "requisitos": "Java, Spring Boot, React, SQL",
        "municipio": {
          "id": 1
