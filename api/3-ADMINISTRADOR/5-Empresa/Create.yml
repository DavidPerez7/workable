  url: "{{baseUrl}}/api/empresa"
  body:
    type: json
    data: |-
      {
        "nombre": "Innova Cloud S.A.S",
        "numeroTrabajadores": 75,
        "email": "contacto@innovacloud.com",
        "telefono": "6015558899",
        "nit": "901234567",
        "categories": ["TECNOLOGIA", "SERVICIOS"],
        "municipio": {
          "id": 2
        },
        "descripcion": "Empresa especializada en software en la nube, integración y consultoría tecnológica.",
