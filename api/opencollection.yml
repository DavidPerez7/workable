opencollection: 1.0.0

info:
  name: api
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: baseUrl
      value: http://localhost:8080
    - name: authToken
      value: ""

auth:
  type: bearer
  bearer:
    token: "{{authToken}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
